<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Watches</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f0f0f;
color:white;
}

header{
height:100vh;
background:url('https://images.unsplash.com/photo-1523170335258-f5ed11844a49?w=1200')
center/cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero{
background:rgba(0,0,0,.6);
padding:40px;
border-radius:20px;
}

.hero h1{
font-size:55px;
margin-bottom:15px;
}

.hero p{
font-size:20px;
color:#ddd;
}

.btn{
display:inline-block;
margin-top:20px;
padding:12px 30px;
background:gold;
color:black;
text-decoration:none;
font-weight:bold;
border-radius:10px;
}

.products{
padding:80px 20px;
}

.products h2{
text-align:center;
font-size:40px;
margin-bottom:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:#1b1b1b;
border-radius:20px;
overflow:hidden;
transition:.3s;
}

.card:hover{
transform:translateY(-10px);
}

.card img{
width:100%;
height:300px;
object-fit:cover;
}

.card-content{
padding:20px;
}

.card-content h3{
margin-bottom:10px;
}

.price{
color:gold;
font-size:22px;
font-weight:bold;
}

footer{
text-align:center;
padding:30px;
background:#111;
}
</style>
</head>

<body>

<header>
<div class="hero">
<h1>Luxury Watches</h1>
<p>أفضل تشكيلة ساعات فاخرة</p>
<a href="#products" class="btn">تصفح الساعات</a>
</div>
</header>

<section class="products" id="products">
<h2>منتجاتنا</h2>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1547996160-81dfa63595aa?w=800">
<div class="card-content">
<h3>Rolex Submariner</h3>
<p class="price">$850</p>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1522312346375-d1a52e2b99b3?w=800">
<div class="card-content">
<h3>Omega Speedmaster</h3>
<p class="price">$700</p>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1434056886845-dac89ffe9b56?w=800">
<div class="card-content">
<h3>Tag Heuer</h3>
<p class="price">$650</p>
</div>
</div>

</div>
</section>

<footer>
<p>© 2026 Luxury Watches</p>
</footer>

</body>
</html>
